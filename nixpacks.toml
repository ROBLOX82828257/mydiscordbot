[phases.setup]
nixPkgs = [
  "nodejs_22",
  "cairo",
  "pango",
  "libpng",
  "libjpeg",
  "giflib",
  "librsvg",
  "fontconfig",
  "pkg-config",
]

[phases.install]
cmds = [
  "corepack enable",
  "COREPACK_INTEGRITY_KEYS=0 corepack prepare pnpm@10.26.1 --activate",
  "pnpm install --frozen-lockfile",
]

[phases.build]
cmds = []

[start]
cmd = "pnpm --filter @workspace/discord-bot run dev"
